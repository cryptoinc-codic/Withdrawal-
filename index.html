<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Payout Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            background-color: #05070a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,15%,0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(220,100%,10%,0.1) 0, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
        }

        .neo-glass {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .pulse-secure {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .method-card input:checked + label {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-xl">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-green-500 pulse-secure"></div>
                <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Security: Tier 3 Active</span>
            </div>
            <span class="text-xs font-mono text-blue-400">Terminal ID: #882-XPL</span>
        </div>

        <div class="neo-glass rounded-[2.5rem] overflow-hidden">
            <div class="p-8 pb-0">
                <h1 class="text-3xl font-extrabold tracking-tight">Withdrawal Terminal</h1>
                <p class="text-gray-500 text-sm mt-1">Encrypted multi-signature transaction protocol</p>
            </div>

            <div class="flex px-8 mt-8 gap-4">
                <div class="h-1 flex-1 bg-blue-600 rounded-full"></div>
                <div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
                <div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
            </div>

            <form class="p-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase ml-1">Asset Allocation</label>
                        <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-4">
                            <p class="text-sm text-gray-400">Settled Balance</p>
                            <p class="text-2xl font-bold font-mono text-white">$42,950.00</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase ml-1">Request Amount</label>
                        <div class="relative">
                            <input type="number" placeholder="0.00" class="w-full bg-gray-900/80 border border-gray-700 focus:border-blue-500 rounded-2xl py-4 px-5 text-xl font-mono text-white transition-all outline-none">
                            <button type="button" class="absolute right-4 top-4 text-xs font-bold text-blue-500 hover:text-blue-400">MAX</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Withdrawal Network</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="method-card">
                            <input type="radio" name="method" id="btc" class="hidden" checked>
                            <label for="btc" class="flex flex-col items-center justify-center p-5 border-2 border-gray-800 rounded-3xl cursor-pointer transition-all hover:border-gray-600">
                                <i class="fab fa-bitcoin text-2xl text-orange-400 mb-2"></i>
                                <span class="font-bold text-sm">Bitcoin (BTC)</span>
                                <span class="text-[10px] text-gray-500 uppercase mt-1">L1 Network</span>
                            </label>
                        </div>
                        <div class="method-card">
                            <input type="radio" name="method" id="paypal" class="hidden">
                            <label for="paypal" class="flex flex-col items-center justify-center p-5 border-2 border-gray-800 rounded-3xl cursor-pointer transition-all hover:border-gray-600">
                                <i class="fab fa-paypal text-2xl text-blue-400 mb-2"></i>
                                <span class="font-bold text-sm">PayPal Express</span>
                                <span class="text-[10px] text-gray-500 uppercase mt-1">Instant FIAT</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Destination Credentials</label>
                    <div class="relative">
                        <i class="fas fa-link absolute left-5 top-5 text-gray-600"></i>
                        <input type="text" placeholder="Wallet hash or account identifier" class="w-full bg-gray-900/80 border border-gray-700 focus:border-blue-500 rounded-2xl py-4 pl-12 pr-5 text-sm transition-all outline-none">
                    </div>
                </div>

                <div class="bg-black/30 rounded-2xl p-5 border border-gray-800/50 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Network Fee</span>
                        <span class="font-mono text-gray-300">-$2.50</span>
                    </div>
                    <div class="flex justify-between text-sm pt-3 border-t border-gray-800">
                        <span class="text-gray-400 font-bold">Net Payout</span>
                        <span class="font-mono text-green-400 font-bold text-lg">$0.00</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold py-5 rounded-[1.5rem] shadow-[0_0_30px_rgba(37,99,235,0.3)] transition-all active:scale-[0.97] flex items-center justify-center gap-3">
                    INITIATE PAYOUT <i class="fas fa-chevron-right text-xs"></i>
                </button>
            </form>
        </div>
        
        <p class="text-center mt-8 text-[10px] text-gray-600 uppercase tracking-widest font-semibold">
            <i class="fas fa-lock mr-2"></i> End-to-End AES-256 Bit Encryption Standard
        </p>
    </div>

</body>
</html>
