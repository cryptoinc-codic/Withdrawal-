<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Secure | Institutional Payout Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@500;600&display=swap');
        
        * {
            transition: background-color 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        body {
            font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
        }

        /* ========= LIGHT MODE (CRISP, HIGH CONTRAST, PROFESSIONAL) ========= */
        body.light-mode {
            background: #f0f2f8;
            background-image: radial-gradient(circle at 15% 30%, rgba(37, 99, 235, 0.02) 0%, rgba(0,0,0,0) 70%);
            color: #0a0f1c;
        }

        body.light-mode .neo-glass {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        body.light-mode .method-card input:checked + label {
            border-color: #2563eb;
            background: rgba(37, 99, 235, 0.06);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.08);
        }

        body.light-mode .card-bg {
            background: #ffffff;
            border-color: #e9edf2;
        }

        body.light-mode .input-modern {
            background: #ffffff;
            border-color: #e2e8f0;
            color: #0a0f1c;
        }
        body.light-mode .input-modern::placeholder {
            color: #8a99b0;
        }
        body.light-mode .label-primary {
            color: #2c3e66;
        }
        body.light-mode .text-balance {
            color: #0f172a;
        }
        body.light-mode .text-fee {
            color: #475569;
        }
        body.light-mode .fee-container {
            background: #f8fafc;
            border-color: #e9edf2;
        }
        body.light-mode .network-label {
            color: #1e293b;
        }
        body.light-mode .security-tag {
            color: #4b5563;
        }

        /* ========= DARK MODE (RICH, DEPTH, PROFESSIONAL) ========= */
        body.dark-mode {
            background: #060b14;
            background-image: radial-gradient(ellipse at 20% 30%, rgba(37, 99, 235, 0.08) 0%, transparent 60%);
            color: #eef2ff;
        }

        body.dark-mode .neo-glass {
            background: rgba(8, 14, 23, 0.92);
            backdrop-filter: blur(24px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.6);
        }

        body.dark-mode .method-card input:checked + label {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.12);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.18);
        }

        body.dark-mode .card-bg {
            background: #0f1622;
            border-color: #1e293b;
        }

        body.dark-mode .input-modern {
            background: #0f1622;
            border-color: #253041;
            color: #f1f5f9;
        }
        body.dark-mode .input-modern::placeholder {
            color: #6c7a91;
        }
        body.dark-mode .label-primary {
            color: #b9c7dd;
        }
        body.dark-mode .text-balance {
            color: #ffffff;
        }
        body.dark-mode .text-fee {
            color: #b9c7dd;
        }
        body.dark-mode .fee-container {
            background: #0b101a;
            border-color: #1e2a3c;
        }
        body.dark-mode .network-label {
            color: #e2e8f0;
        }
        body.dark-mode .security-tag {
            color: #9ca3af;
        }

        /* Shared utilities */
        .pulse-secure {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
            animation: pulse 2.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .theme-toggle-icon {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .theme-toggle-icon:hover {
            transform: scale(1.08);
            opacity: 0.9;
        }

        .glow-btn {
            transition: all 0.2s ease;
        }
        .glow-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 30px -12px rgba(37, 99, 235, 0.4);
        }

        input:focus, button:focus {
            outline: none;
        }

        .max-badge {
            transition: all 0.15s ease;
        }
        .max-badge:hover {
            background: rgba(37, 99, 235, 0.12);
            border-radius: 20px;
        }

        /* micro-interactions */
        .method-card label {
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
    </style>
</head>
<body class="light-mode flex items-center justify-center min-h-screen p-5 md:p-6">

    <div class="w-full max-w-xl">
        <!-- Top status bar with eye toggle -->
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 pulse-secure"></div>
                <span class="text-[11px] font-bold uppercase tracking-wider security-tag">Security: Tier 007 (HSM)</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[11px] font-mono font-semibold text-blue-600 dark:text-blue-400 tracking-wide">Terminal: #882-XPL</span>
                <!-- Eye icon: toggles between white/black background (light/dark mode) -->
                <i class="fas fa-eye theme-toggle-icon text-gray-700 dark:text-gray-200 text-sm cursor-pointer" id="themeEyeIcon"></i>
            </div>
        </div>

        <!-- Main Card -->
        <div class="neo-glass rounded-[2rem] overflow-hidden">
            <div class="p-7 pb-0 md:p-8 md:pb-0">
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight dark:text-white text-gray-900">Withdrawal<span class="text-blue-600"> Terminal</span></h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1 font-medium">Encrypted multi‑sig • real‑time settlement</p>
            </div>

            <!-- Stepper -->
            <div class="flex px-7 md:px-8 mt-7 gap-3">
                <div class="h-1 flex-1 bg-blue-600 rounded-full"></div>
                <div class="h-1 flex-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
                <div class="h-1 flex-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
            </div>

            <form class="p-7 md:p-8 space-y-8" id="withdrawalForm">
                <!-- Row: Total Balance + Withdrawal Amount -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold tracking-wider label-primary uppercase ml-1">Total Balance</label>
                        <div class="card-bg border rounded-2xl p-4 shadow-sm">
                            <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">Available (USD)</p>
                            <p class="text-2xl md:text-3xl font-bold font-mono text-balance" id="totalBalanceDisplay">$42,950.00</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold tracking-wider label-primary uppercase ml-1">Withdrawal Amount</label>
                        <div class="relative">
                            <input type="number" id="withdrawalAmount" placeholder="0.00" class="w-full input-modern border rounded-2xl py-4 px-5 text-xl font-mono font-semibold transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <button type="button" id="maxBtn" class="absolute right-4 top-4 text-xs font-extrabold text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 max-badge px-2 py-1">MAX</button>
                        </div>
                    </div>
                </div>

                <!-- Network selection -->
                <div class="space-y-3">
                    <label class="text-[11px] font-bold tracking-wider label-primary uppercase ml-1">Withdrawal Network</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="method-card">
                            <input type="radio" name="method" id="btc" class="hidden" checked>
                            <label for="btc" class="flex flex-col items-center justify-center p-5 border-2 rounded-2xl cursor-pointer transition-all">
                                <i class="fab fa-bitcoin text-2xl text-orange-500 mb-2"></i>
                                <span class="font-bold text-sm network-label">Bitcoin (BTC)</span>
                                <span class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mt-1 font-medium">L1 • Blockchain</span>
                            </label>
                        </div>
                        <div class="method-card">
                            <input type="radio" name="method" id="paypal" class="hidden">
                            <label for="paypal" class="flex flex-col items-center justify-center p-5 border-2 rounded-2xl cursor-pointer transition-all">
                                <i class="fab fa-paypal text-2xl text-blue-500 mb-2"></i>
                                <span class="font-bold text-sm network-label">PayPal Express</span>
                                <span class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mt-1 font-medium">Instant FIAT</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Withdrawal Address (dynamic) -->
                <div class="space-y-2">
                    <label class="text-[11px] font-bold tracking-wider label-primary uppercase ml-1">Withdrawal Address</label>
                    <div class="relative">
                        <i class="fas fa-map-pin absolute left-5 top-5 text-gray-400 dark:text-gray-500 text-sm"></i>
                        <input type="text" id="destinationInput" placeholder="Enter crypto wallet address" class="w-full input-modern border rounded-2xl py-4 pl-12 pr-5 text-sm transition-all focus:border-blue-500">
                    </div>
                    <p class="text-[10px] text-gray-400 dark:text-gray-500 ml-1 mt-1" id="addressHelper">Bitcoin: legacy/segwit or bc1 address</p>
                </div>

                <!-- Fee & Net Payout (dynamic calculation) -->
                <div class="fee-container rounded-2xl p-5 border space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-medium text-fee">Network fee (flat rate)</span>
                        <span class="font-mono font-semibold text-fee">-$2.30</span>
                    </div>
                    <div class="flex justify-between items-center pt-3 border-t border-gray-200 dark:border-gray-700">
                        <span class="text-sm font-bold text-balance">Net Payout</span>
                        <span class="font-mono text-green-600 dark:text-green-400 font-bold text-xl md:text-2xl" id="netPayoutValue">$0.00</span>
                    </div>
                </div>

                <!-- Confirm action -->
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-5 rounded-2xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-3 glow-btn text-base tracking-wide">
                    <i class="fas fa-shield-alt text-sm"></i> CONFIRM WITHDRAWAL <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>

        <!-- Footer encryption badge -->
        <div class="text-center mt-7">
            <p class="text-[10px] font-mono text-gray-400 dark:text-gray-600 uppercase tracking-wider font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-lock text-[10px]"></i> End-to-End AES-256 | HSM Signing | Payout ID: RAND-882X
            </p>
        </div>
    </div>

    <script>
        (function() {
            // ---------- DOM elements ----------
            const withdrawalAmountInput = document.getElementById('withdrawalAmount');
            const netPayoutSpan = document.getElementById('netPayoutValue');
            const maxBtn = document.getElementById('maxBtn');
            const btcRadio = document.getElementById('btc');
            const paypalRadio = document.getElementById('paypal');
            const destinationInput = document.getElementById('destinationInput');
            const totalBalanceDisplay = document.getElementById('totalBalanceDisplay');
            const form = document.getElementById('withdrawalForm');
            const themeEyeIcon = document.getElementById('themeEyeIcon');
            const addressHelper = document.getElementById('addressHelper');

            // Constants
            const TOTAL_BALANCE = 42950.00;
            const NETWORK_FEE = 2.50;

            // Display total balance
            totalBalanceDisplay.innerText = `$${TOTAL_BALANCE.toFixed(2)}`;

            // ---------- Dynamic net payout calculation (withdrawal amount - network fee) ----------
            function updateNetPayout() {
                let amount = parseFloat(withdrawalAmountInput.value);
                if (isNaN(amount) || amount < 0) amount = 0;
                // Hard cap at total balance (UX improvement but doesn't change core requirement)
                let cappedAmount = Math.min(amount, TOTAL_BALANCE);
                if (cappedAmount !== amount && amount > TOTAL_BALANCE) {
                    withdrawalAmountInput.value = TOTAL_BALANCE;
                    amount = TOTAL_BALANCE;
                }
                let netPayout = amount - NETWORK_FEE;
                if (netPayout < 0) netPayout = 0;
                netPayoutSpan.textContent = `$${netPayout.toFixed(2)}`;
            }

            // Update placeholder + helper text based on selected network (Bitcoin / PayPal)
            function updateDestinationField() {
                if (btcRadio.checked) {
                    destinationInput.placeholder = "Enter crypto wallet address (BTC)";
                    addressHelper.innerHTML = '<i class="fas fa-circle-info mr-1"></i> Bitcoin address: bc1..., 1..., or 3...';
                } else if (paypalRadio.checked) {
                    destinationInput.placeholder = "Enter PayPal email address";
                    addressHelper.innerHTML = '<i class="fas fa-envelope mr-1"></i> PayPal email where funds will be sent.';
                }
            }

            // MAX button: set withdrawal amount = total balance
            function setMaxAmount() {
                withdrawalAmountInput.value = TOTAL_BALANCE;
                updateNetPayout();
            }

            // Input handler with balance validation
            withdrawalAmountInput.addEventListener('input', function(e) {
                let rawValue = parseFloat(e.target.value);
                if (!isNaN(rawValue) && rawValue > TOTAL_BALANCE) {
                    withdrawalAmountInput.value = TOTAL_BALANCE;
                }
                updateNetPayout();
            });

            // Network toggle listeners
            btcRadio.addEventListener('change', function() {
                if (btcRadio.checked) {
                    updateDestinationField();
                }
            });
            paypalRadio.addEventListener('change', function() {
                if (paypalRadio.checked) {
                    updateDestinationField();
                }
            });

            maxBtn.addEventListener('click', setMaxAmount);

            // ---------- THEME TOGGLE (eye icon: switches between light/white mode and dark/black mode) ----------
            function setTheme(theme) {
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                    document.body.classList.remove('light-mode');
                    localStorage.setItem('terminal_theme', 'dark');
                    themeEyeIcon.classList.remove('fa-eye');
                    themeEyeIcon.classList.add('fa-eye-slash');
                } else {
                    document.body.classList.add('light-mode');
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('terminal_theme', 'light');
                    themeEyeIcon.classList.remove('fa-eye-slash');
                    themeEyeIcon.classList.add('fa-eye');
                }
            }

            function toggleTheme() {
                if (document.body.classList.contains('light-mode')) {
                    setTheme('dark');
                } else {
                    setTheme('light');
                }
            }

            // load saved theme
            const savedTheme = localStorage.getItem('terminal_theme');
            if (savedTheme === 'dark') {
                setTheme('dark');
            } else {
                setTheme('light');   // light mode with high contrast (texts are dark, not white)
            }

            themeEyeIcon.addEventListener('click', toggleTheme);

            // ---------- FORM SUBMISSION (powerful professional confirmation) ----------
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const method = btcRadio.checked ? 'Bitcoin (BTC)' : 'PayPal Express';
                const rawAmount = parseFloat(withdrawalAmountInput.value);
                const amount = isNaN(rawAmount) ? 0 : rawAmount;
                const netPayoutValue = amount - NETWORK_FEE;
                const destination = destinationInput.value.trim();
                const finalNet = netPayoutValue > 0 ? netPayoutValue : 0;

                // validations
                if (amount <= 0) {
                    alert('⚠️ Invalid withdrawal amount | Please enter an amount greater than 0.');
                    return;
                }
                if (amount > TOTAL_BALANCE) {
                    alert(`⚠️ Insufficient balance | Requested $${amount.toFixed(2)} exceeds available $${TOTAL_BALANCE.toFixed(2)}.`);
                    return;
                }
                if ((amount - NETWORK_FEE) <= 0) {
                    alert(`⚠️ Network fee ($${NETWORK_FEE.toFixed(2)}) exceeds or equals withdrawal amount. Net payout would be $0.00. Increase amount.`);
                    return;
                }
                if (destination === "") {
                    const fieldHint = btcRadio.checked ? 'crypto wallet address' : 'PayPal email address';
                    alert(`❌ Missing withdrawal address | Please provide a valid ${fieldHint}.`);
                    return;
                }

                // Professional summary with timestamp + reference
                const referenceID = 'WD-' + Math.random().toString(36).substring(2, 10).toUpperCase();
                const timestamp = new Date().toLocaleString('en-US', { hour12: false });
                
                alert(
`✅ WITHDRAWAL CONFIRMED (NEXUS SECURE)
━━━━━━━━━━━━━━━━━━━━━━━━━━━
Network          : ${method}
Withdrawal Amount: $${amount.toFixed(2)}
Network Fee      : $${NETWORK_FEE.toFixed(2)}
Net Payout       : $${finalNet.toFixed(2)}
Destination      : ${destination.substring(0, 36)}${destination.length > 36 ? '…' : ''}
Reference ID     : ${referenceID}
Timestamp        : ${timestamp}
━━━━━━━━━━━━━━━━━━━━━━━━━━━
🔒 AES-256 + multi-sig | Terminal #882-XPL`);
                
                // Optional: reset or keep as is? No removal, just keep values but we don't reset per request.
                // professional terminal behavior: keep fields but you can optionally not reset.
            });

            // Initialization
            updateDestinationField();
            withdrawalAmountInput.value = '';
            updateNetPayout();

            // Extra polish: If user leaves amount empty, net payout shows $0.00 (done)
        })();
    </script>
</body>
</html>
