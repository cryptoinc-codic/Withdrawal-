<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Payout Terminal | Nexus Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        
        * {
            transition: background-color 0.25s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Light mode (default) */
        body.light-mode {
            background-color: #f4f7fc;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 102, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            color: #0a0c10;
        }

        body.light-mode .neo-glass {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 25px 40px -18px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.02);
        }

        body.light-mode .method-card input:checked + label {
            border-color: #2563eb;
            background: rgba(37, 99, 235, 0.06);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        body.light-mode .bg-dark-card {
            background-color: #f9fafc;
            border-color: #eef2f6;
        }

        body.light-mode .input-bg {
            background-color: #ffffff;
            border-color: #e2e8f0;
        }

        body.light-mode .fee-card {
            background-color: #f8fafd;
            border-color: #eef2f8;
        }

        /* Dark mode (professional deep) */
        body.dark-mode {
            background-color: #0a0f1a;
            background-image: radial-gradient(at 0% 0%, hsla(220, 80%, 15%, 0.25) 0, transparent 60%), radial-gradient(at 100% 100%, hsla(210, 100%, 12%, 0.2) 0, transparent 60%);
            color: #edf2ff;
        }

        body.dark-mode .neo-glass {
            background: rgba(12, 18, 28, 0.92);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        body.dark-mode .method-card input:checked + label {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.12);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.2);
        }

        body.dark-mode .bg-dark-card {
            background-color: #111827;
            border-color: #1f2a3e;
        }

        body.dark-mode .input-bg {
            background-color: #0f1622;
            border-color: #1e2a3a;
        }

        body.dark-mode .fee-card {
            background-color: #0e1622;
            border-color: #1f2a3c;
        }

        body.dark-mode .text-muted-custom {
            color: #9ca3af;
        }

        body.light-mode .text-muted-custom {
            color: #6b7280;
        }

        .pulse-secure {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .theme-toggle-icon {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .theme-toggle-icon:hover {
            transform: scale(1.05);
        }

        .glow-on-hover {
            transition: all 0.2s ease;
        }

        .glow-on-hover:hover {
            transform: translateY(-1px);
        }

        input:focus, button:focus {
            outline: none;
        }
    </style>
</head>
<body class="light-mode flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-xl">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-green-500 pulse-secure"></div>
                <span class="text-xs font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400">Security: Tier 3 Active</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-mono text-blue-600 dark:text-blue-400">Terminal ID: #882-XPL</span>
                <!-- Eye Icon for theme toggle: changes white to black background and vice versa -->
                <i class="fas fa-eye theme-toggle-icon text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 text-sm cursor-pointer transition-all" id="themeEyeIcon"></i>
            </div>
        </div>

        <div class="neo-glass rounded-[2.5rem] overflow-hidden">
            <div class="p-8 pb-0">
                <h1 class="text-3xl font-extrabold tracking-tight dark:text-white text-gray-900">Withdrawal Terminal</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Encrypted multi-signature transaction protocol</p>
            </div>

            <div class="flex px-8 mt-8 gap-4">
                <div class="h-1 flex-1 bg-blue-600 rounded-full"></div>
                <div class="h-1 flex-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
                <div class="h-1 flex-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
            </div>

            <form class="p-8 space-y-8" id="withdrawalForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Total Balance</label>
                        <div class="bg-dark-card border border-gray-200 dark:border-gray-700 rounded-2xl p-4 shadow-sm">
                            <p class="text-sm text-gray-500 dark:text-gray-400">Settled Balance</p>
                            <p class="text-2xl font-bold font-mono dark:text-white text-gray-900" id="totalBalanceDisplay">$42,950.00</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Withdrawal Amount</label>
                        <div class="relative">
                            <input type="number" id="withdrawalAmount" placeholder="0.00" class="w-full input-bg border border-gray-200 dark:border-gray-700 focus:border-blue-500 rounded-2xl py-4 px-5 text-xl font-mono dark:text-white text-gray-900 transition-all outline-none">
                            <button type="button" id="maxBtn" class="absolute right-4 top-4 text-xs font-bold text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300">MAX</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Withdrawal Network</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="method-card">
                            <input type="radio" name="method" id="btc" class="hidden" checked>
                            <label for="btc" class="flex flex-col items-center justify-center p-5 border-2 border-gray-200 dark:border-gray-700 rounded-3xl cursor-pointer transition-all hover:border-gray-400 dark:hover:border-gray-500">
                                <i class="fab fa-bitcoin text-2xl text-orange-500 mb-2"></i>
                                <span class="font-bold text-sm dark:text-gray-100 text-gray-800">Bitcoin (BTC)</span>
                                <span class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mt-1">L1 Network</span>
                            </label>
                        </div>
                        <div class="method-card">
                            <input type="radio" name="method" id="paypal" class="hidden">
                            <label for="paypal" class="flex flex-col items-center justify-center p-5 border-2 border-gray-200 dark:border-gray-700 rounded-3xl cursor-pointer transition-all hover:border-gray-400 dark:hover:border-gray-500">
                                <i class="fab fa-paypal text-2xl text-blue-500 mb-2"></i>
                                <span class="font-bold text-sm dark:text-gray-100 text-gray-800">PayPal Express</span>
                                <span class="text-[10px] text-gray-500 dark:text-gray-400 uppercase mt-1">Instant FIAT</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Withdrawal Account</label>
                    <div class="relative">
                        <i class="fas fa-link absolute left-5 top-5 text-gray-400 dark:text-gray-500"></i>
                        <input type="text" id="destinationInput" placeholder="Enter crypto wallet address" class="w-full input-bg border border-gray-200 dark:border-gray-700 focus:border-blue-500 rounded-2xl py-4 pl-12 pr-5 text-sm transition-all outline-none dark:text-white text-gray-800">
                    </div>
                </div>

                <div class="fee-card rounded-2xl p-5 border border-gray-200 dark:border-gray-700 space-y-3 shadow-sm">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500 dark:text-gray-400">Network Fee</span>
                        <span class="font-mono dark:text-gray-300 text-gray-700">-$2.50</span>
                    </div>
                    <div class="flex justify-between text-sm pt-3 border-t border-gray-200 dark:border-gray-700">
                        <span class="text-gray-700 dark:text-gray-300 font-bold">Net Payout</span>
                        <span class="font-mono text-green-600 dark:text-green-400 font-bold text-lg" id="netPayoutValue">$0.00</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-5 rounded-[1.5rem] shadow-[0_0_25px_rgba(37,99,235,0.3)] dark:shadow-[0_0_20px_rgba(59,130,246,0.25)] transition-all active:scale-[0.97] flex items-center justify-center gap-3 glow-on-hover">
                    CONFIRM WITHDRAWAL <i class="fas fa-chevron-right text-xs"></i>
                </button>
            </form>
        </div>
        
        <p class="text-center mt-8 text-[10px] text-gray-400 dark:text-gray-500 uppercase tracking-widest font-semibold">
            <i class="fas fa-lock mr-2"></i> End-to-End AES-256 Bit Encryption Standard
        </p>
    </div>

    <script>
        // DOM elements
        const withdrawalAmountInput = document.getElementById('withdrawalAmount');
        const netPayoutSpan = document.getElementById('netPayoutValue');
        const maxBtn = document.getElementById('maxBtn');
        const btcRadio = document.getElementById('btc');
        const paypalRadio = document.getElementById('paypal');
        const destinationInput = document.getElementById('destinationInput');
        const totalBalanceDisplay = document.getElementById('totalBalanceDisplay');
        const form = document.getElementById('withdrawalForm');
        const themeEyeIcon = document.getElementById('themeEyeIcon');

        // Fixed values
        const TOTAL_BALANCE = 42950.00;
        const NETWORK_FEE = 2.50;

        // Theme handling with eye icon (light <-> dark)
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                document.body.classList.remove('light-mode');
                localStorage.setItem('terminalTheme', 'dark');
                // Change eye icon to 'eye-slash' indicating toggle to light
                themeEyeIcon.classList.remove('fa-eye');
                themeEyeIcon.classList.add('fa-eye-slash');
            } else {
                document.body.classList.add('light-mode');
                document.body.classList.remove('dark-mode');
                localStorage.setItem('terminalTheme', 'light');
                themeEyeIcon.classList.remove('fa-eye-slash');
                themeEyeIcon.classList.add('fa-eye');
            }
        }

        function toggleTheme() {
            if (document.body.classList.contains('light-mode')) {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('terminalTheme');
        if (savedTheme === 'dark') {
            setTheme('dark');
        } else {
            setTheme('light'); // default light but with modern off-white background, not "too white"
        }

        themeEyeIcon.addEventListener('click', toggleTheme);

        // Helper: Update net payout based on withdrawal amount
        function updateNetPayout() {
            let amount = parseFloat(withdrawalAmountInput.value);
            if (isNaN(amount) || amount < 0) {
                amount = 0;
            }
            let netPayout = amount - NETWORK_FEE;
            if (netPayout < 0) netPayout = 0;
            netPayoutSpan.textContent = `$${netPayout.toFixed(2)}`;
        }

        // Helper: Update withdrawal account placeholder based on selected network
        function updateDestinationPlaceholder() {
            if (btcRadio.checked) {
                destinationInput.placeholder = "Enter crypto wallet address";
            } else if (paypalRadio.checked) {
                destinationInput.placeholder = "Enter PayPal email address";
            }
        }

        // MAX button logic: sets withdrawal amount to total balance
        function setMaxAmount() {
            withdrawalAmountInput.value = TOTAL_BALANCE;
            updateNetPayout();
        }

        // Event listeners for amount changes
        withdrawalAmountInput.addEventListener('input', function(e) {
            let value = parseFloat(e.target.value);
            if (!isNaN(value) && value > TOTAL_BALANCE) {
                withdrawalAmountInput.value = TOTAL_BALANCE;
                updateNetPayout();
            } else {
                updateNetPayout();
            }
        });

        // When network changes (Bitcoin or PayPal), update placeholder
        btcRadio.addEventListener('change', function() {
            if (btcRadio.checked) {
                updateDestinationPlaceholder();
            }
        });
        paypalRadio.addEventListener('change', function() {
            if (paypalRadio.checked) {
                updateDestinationPlaceholder();
            }
        });

        // MAX button click
        maxBtn.addEventListener('click', setMaxAmount);

        // Form submission: powerful confirmation with detailed breakdown
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const method = btcRadio.checked ? 'Bitcoin (BTC)' : 'PayPal Express';
            const amount = parseFloat(withdrawalAmountInput.value);
            const netPayout = amount - NETWORK_FEE;
            const destination = destinationInput.value.trim();
            
            if (isNaN(amount) || amount <= 0) {
                alert('⚠️ Invalid amount | Please enter a valid withdrawal amount greater than zero.');
                return;
            }
            if (amount > TOTAL_BALANCE) {
                alert(`⚠️ Insufficient funds | Withdrawal amount ($${amount.toFixed(2)}) exceeds total balance ($${TOTAL_BALANCE.toFixed(2)}).`);
                return;
            }
            if (netPayout <= 0) {
                alert(`⚠️ Network fee ($${NETWORK_FEE.toFixed(2)}) exceeds or equals withdrawal amount. Net payout would be $0.00. Please increase amount.`);
                return;
            }
            if (!destination) {
                const fieldLabel = btcRadio.checked ? 'crypto wallet address' : 'PayPal email address';
                alert(`⚠️ Missing destination | Please enter your ${fieldLabel} under "Withdrawal Account".`);
                return;
            }
            
            // Professional-grade confirmation summary
            alert(`✅ CONFIRMATION VERIFIED\n\n┌─────────────────────────────┐\n│  INSTITUTIONAL WITHDRAWAL   │\n└─────────────────────────────┘\n\nNetwork         : ${method}\nWithdrawal Amt  : $${amount.toFixed(2)}\nNetwork Fee     : $${NETWORK_FEE.toFixed(2)}\nNet Payout      : $${netPayout.toFixed(2)}\nAccount         : ${destination.substring(0, 30)}${destination.length > 30 ? '…' : ''}\nTimestamp       : ${new Date().toLocaleString()}\n\n🔒 Secure protocol • AES-256 • Non-repudiation`);
        });

        // Initialize placeholder and net payout
        updateDestinationPlaceholder();
        withdrawalAmountInput.value = '';
        updateNetPayout();

        // Additional micro-interaction: style for max button and better user experience
        // Ensure total balance display stays consistent
        totalBalanceDisplay.innerText = `$${TOTAL_BALANCE.toFixed(2)}`;
    </script>
</body>
</html>
